<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>FeedbackLoop AI</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body><header class="topbar"><a class="brand" href="/">FeedbackLoop <i>AI</i></a><nav><a class="active" href="/">資料問答</a><a href="/feedbacks">系統連線</a></nav><span class="system-state"><i></i>可開始使用</span></header><main class="app-shell"><aside class="sidebar"><div><p class="eyebrow">NEW CONVERSATION</p><h1>資料問答</h1><p class="sidebar-copy">上傳資料後，用自然語言快速探索內容。</p></div><label class="dropzone"><input id="fileInput" type="file" accept=".csv,.xlsx,.xls,.pdf,.txt,.docx"><span class="upload-icon">↑</span><strong>上傳檔案</strong><small>CSV、Excel、PDF、TXT、DOCX</small></label><div id="fileStatus" class="file-status"><span class="file-mark">＋</span><span>尚未選擇檔案</span></div></aside><section class="chat-panel"><div class="chat-header"><div><p class="eyebrow">AI ASSISTANT</p><h2>今天想了解什麼？</h2></div><div class="header-meta d-flex align-items-center"><span id="readyState" class="status-pill">等待檔案</span><span class="model-badge badge rounded-pill text-break" title="{{ llm_model }}"><i>MODEL</i>{{ llm_model }}</span></div></div><div id="conversation" class="conversation"><div class="empty-state"><div class="assistant-orb">✦</div><h3>開始你的資料對話</h3><p>上傳檔案後，直接輸入問題即可取得回答。</p><div class="suggestions"><button class="btn btn-sm" data-suggestion="請摘要這份資料的重點">摘要資料重點</button><button class="btn btn-sm" data-suggestion="資料中有什麼明顯趨勢？">找出主要趨勢</button><button class="btn btn-sm" data-suggestion="有哪些資料需要進一步確認？">找出異常項目</button></div></div></div><form id="questionForm" class="question-box"><textarea id="question" rows="1" placeholder="輸入問題…" disabled></textarea><button id="askButton" type="submit" disabled aria-label="送出問題">↑</button></form><p class="helper">Enter 送出 · Shift + Enter 換行 · AI 回答可能有誤，請確認原始資料。</p></section></main><script src="{{ url_for('static', filename='app.js') }}"></script></body></html>
